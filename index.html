<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zia Grocery Shop</title>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5}

/* HEADER */
header{
    background:#198754;
    color:#fff;
    padding:20px;
    text-align:center;
    position:sticky;
    top:0;
}

/* SEARCH */
#search{
    width:90%;
    max-width:500px;
    padding:10px;
    border-radius:8px;
    border:none;
}

/* PRODUCTS GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    text-align:center;
}

.card img{
    width:150px;
    height:150px;
    object-fit:cover;
    border-radius:8px;
}

button{
    background:#198754;
    color:#fff;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

/* CART BUTTON */
.cart-btn{
    position:absolute;
    right:20px;
    top:20px;
    background:#fff;
    color:#198754;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* OVERLAY */
#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:999;
}

/* CART SIDEBAR */
#cart{
    position:fixed;
    top:0;
    right:-400px;
    width:340px;
    height:100%;
    background:#fff;
    box-shadow:-2px 0 10px rgba(0,0,0,.3);
    padding:20px;
    transition:0.3s;
    z-index:1000;
}

#cart h3{
    margin-top:0;
}

.item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    padding:5px 0;
    border-bottom:1px solid #eee;
}

.remove{
    background:red;
    color:#fff;
    border:none;
    padding:2px 6px;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🛒 Zia Grocery Shop</h1>
<p>Mainit, Nabunturan, Davao de Oro</p>

<input id="search" placeholder="Search..." onkeyup="filterProducts()">

<!-- CART BUTTON -->
<div class="cart-btn" onclick="openCart()">
🛒 Cart (<span id="count">0</span>)
</div>
</header>

<!-- PRODUCTS -->
<div class="grid" id="products"></div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeCart()"></div>

<!-- CART PANEL -->
<div id="cart">
    <h3>Cart</h3>
    <div id="items">No items</div>
    <hr>
    <b>Total: ₱<span id="total">0</span></b>
    <br><br>
    <h3 style="margin-top:10px;">Customer Details</h3>

<input id="custName" placeholder="Name" style="width:100%; margin-top:8px; padding:10px;">
<input id="custPhone" placeholder="Phone" style="width:100%; margin-top:8px; padding:10px;">
<input id="custAddress" placeholder="Address" style="width:100%; margin-top:8px; padding:10px;">

<button onclick="sendWhatsAppOrder()" style="
width:100%;
margin-top:12px;
background:#25D366;
color:#fff;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;">
📲 Order on WhatsApp
</button>
    <button onclick="closeCart()" style="margin-top:10px;background:#ccc;color:#000;">Close</button>
</div>

<script>

const products=[
{name:"Premium Rice",price:55,img:"https://picsum.photos/200?1"},
{name:"Regular Rice",price:48,img:"https://picsum.photos/200?2"},
{name:"Lucky Me Noodles",price:18,img:"https://picsum.photos/200?3"},
{name:"Coca-Cola 1.5L",price:95,img:"https://picsum.photos/200?4"},
{name:"Sardines",price:28,img:"https://picsum.photos/200?5"},
{name:"Coffee Mix",price:15,img:"https://picsum.photos/200?6"},
{name:"Sugar",price:80,img:"https://i.ibb.co/39drGzWK/Sugar.jpg"},
{name:"Cooking Oil",price:145,img:"https://picsum.photos/200?8"},
{name:"Eggs",price:9,img:"https://picsum.photos/200?9"},
{name:"Bath Soap",price:42,img:"https://picsum.photos/200?10"}
];

let cart=[];

/* RENDER PRODUCTS */
function render(list=products){
const c=document.getElementById("products");
c.innerHTML="";
list.forEach((p,i)=>{
c.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₱${p.price}</p>
<button onclick="add(${i})">Add to Cart</button>
</div>`;
});
}

/* ADD TO CART */
function add(i){
cart.push(products[i]);
updateCart();
}

/* UPDATE CART */
function updateCart(){

let t=0;
let h="";

cart.forEach((x,i)=>{
t+=x.price;
h+=`
<div class="item">
<span>${x.name} - ₱${x.price}</span>
<button class="remove" onclick="removeItem(${i})">❌</button>
</div>
`;
});

document.getElementById("items").innerHTML=h||"No items";
document.getElementById("total").innerText=t;
document.getElementById("count").innerText=cart.length;
}

/* REMOVE ITEM */
function removeItem(i){
cart.splice(i,1);
updateCart();
}

/* CART OPEN */
function openCart(){
document.getElementById("cart").style.right="0px";
document.getElementById("overlay").style.display="block";
}

/* CART CLOSE */
function closeCart(){
document.getElementById("cart").style.right="-400px";
document.getElementById("overlay").style.display="none";
}

/* SEARCH */
function filterProducts(){
const q=document.getElementById("search").value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(q)));
}

/* CHECKOUT */
function sendWhatsAppOrder(){

    if(cart.length === 0){
        alert("Cart is empty!");
        return;
    }

    let name = document.getElementById("custName").value;
    let phone = document.getElementById("custPhone").value;
    let address = document.getElementById("custAddress").value;

    if(!name || !phone || !address){
        alert("Please fill all customer details!");
        return;
    }

    let msg = "🛒 *New Grocery Order*%0A%0A";

    cart.forEach((item, i)=>{
        msg += `${i+1}. ${item.name} - ₱${item.price}%0A`;
    });

    let total = cart.reduce((sum, item)=> sum + item.price, 0);

    msg += `%0A💰 *Total:* ₱${total}%0A`;
    msg += `%0A👤 *Name:* ${name}`;
    msg += `%0A📞 *Phone:* ${phone}`;
    msg += `%0A🏠 *Address:* ${address}`;

    // 👉 Replace this number with your WhatsApp number
    let whatsappNumber = "8615536010381";

    let url = `https://wa.me/${8615536010381}?text=${msg}`;

    window.open(url, "_blank");

    // EMPTY CART AFTER ORDER
    cart = [];
    updateCart();

    document.getElementById("custName").value = "";
    document.getElementById("custPhone").value = "";
    document.getElementById("custAddress").value = "";

    closeCart();
}
render();

</script>

</body>
</html>
